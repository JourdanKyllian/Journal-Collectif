name: CI Journal Collectif

# Activation à chaque push sur la branche main ou lors d'une Pull Request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # BACKEND (NestJS)
  # ==========================================
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Configuration de Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Installation des dépendances
        run: npm ci --legacy-peer-deps

      - name: Compilation de l'API
        run: npm run build

      - name: Lancement des tests
        run: npm run test

  # ==========================================
  # FRONTEND (Next.js)
  # ==========================================
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Configuration de Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Installation des dépendances
        run: npm ci --legacy-peer-deps

      - name: Compilation Standalone
        # Next.js n'enverra pas de données de télémétrie pendant la CI
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

  # ==========================================
  # Scan Trivy
  # ==========================================
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/jourdankyllian/dockertp:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'