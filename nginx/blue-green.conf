# ==========================================
# 1. DÉCLARATION DES SERVEURS (UPSTREAMS)
# ==========================================

# Backend Active (Le trafic de production actuel)
upstream active_backend {
    server api-blue:3000; # ACTIVE
}

# Backend Standby (La nouvelle version en attente de validation)
upstream standby_backend {
    server api-green:3000; # STANDBY
}

# Frontend (L'interface Next.js Standalone)
upstream frontend_app {
    server frontend:3000;
}

# ==========================================
# 2. CONFIGURATION DU ROUTEUR
# ==========================================

server {
    listen 80;
    server_name localhost;

    # ROUTES DE SANTÉ (Silencieuses)
    location /health {
        # Pointe toujours vers la version active
        proxy_pass http://active_backend/health;
        access_log off;
    }

    # L'API DE PRODUCTION (Backend Actif)
    location /api/ {
        # Pointe vers l'upstream actif géré par le script deploy.sh
        proxy_pass http://active_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # L'INTERFACE UTILISATEUR (Frontend)
    location / {
        proxy_pass http://frontend_app;
        
        # Headers nécessaires pour Next.js
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # LA ROUTE SECRÈTE (Test du Standby)
    location /test-standby/ {
        proxy_pass http://standby_backend/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}