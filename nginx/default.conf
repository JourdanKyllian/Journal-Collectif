upstream frontend_app {
    server frontend:3000;
}
upstream api_backend {
    server api:3000;
}

server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header Host $host;
    }
}